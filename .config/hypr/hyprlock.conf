general {
    hide_cursor = false
    grace = o
}

background {
    monitor =
    path = ~/.config/Wallpapers/05.jpg
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 300, 50
    rounding = 0
    outline_thickness = 2
    outer_color = #3cc3f0
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Senha...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(200, 200, 200, 1.0)
    font_size = 112
    font_family = SF Pro Text Bold
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d de %B de %Y")"
    color = rgba(200, 200, 200, 0.8)
    font_size = 20
    font_family = SF Pro Text Bold
    position = 0, 100
    halign = center
    valign = center
}
